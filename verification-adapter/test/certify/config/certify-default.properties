# Certify default properties — adapted for adapter integration testing.
# Changes from upstream reference:
#   - database.hostname → certify-postgres (our container name)
#   - domain.url uses certify-nginx (Docker-internal)
#   - authorization.url uses Certify itself as OAuth AS (Pre-Auth Code flow)

spring.application.name=certify
spring.cloud.config.uri=http://localhost:8888

server.port=8090
server.servlet.path=/v1/certify

openapi.info.title=Certify Service
openapi.info.description=Rest Endpoints for operations related to certify
openapi.info.version=1.0
openapi.info.license.name=Mosip
openapi.info.license.url=https://docs.mosip.io/platform/license
mosip.certify.domain.url=http://certify:${server.port}
openapi.service.server.url=${mosip.certify.domain.url}${server.servlet.path}
openapi.service.server.description=Certify Service
springdoc.swagger-ui.disable-swagger-default-url=true
spring.mvc.servlet.path=${server.servlet.path}

spring.messages.basename=messages
spring.messages.encoding=UTF-8

spring.main.allow-bean-definition-overriding=true
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

## Authentication & Authorization
mosip.certify.security.auth.post-urls={}
mosip.certify.security.auth.put-urls={}
mosip.certify.security.auth.get-urls={}

mosip.certify.security.ignore-csrf-urls=**/actuator/**,/favicon.ico,**/error,\
  **/swagger-ui/**,**/v3/api-docs/**,**/issuance/**,**/system-info/**,**/credential-configurations/**,\
  **/.well-known/**,**/ledger-search/**,**/credentials/**,**/oauth/**,**/pre-authorized-data/**,**/credential-offer-data/**

mosip.certify.security.ignore-auth-urls=**/actuator/**,**/error,**/swagger-ui/**,\
  **/v3/api-docs/**, **/issuance/**,**/rendering-template/**,**/system-info/**,**/credential-configurations/**,\
  **/.well-known/**,**/ledger-search/**,**/credentials/**,**/oauth/**,**/pre-authorized-data/**,**/credential-offer-data/**

mosip.certify.security.cors-enabled-get-method-urls=/rendering-template/**

## Discovery
mosip.certify.discovery.issuer-id=${mosip.certify.domain.url}${server.servlet.path}

# Certify is its own auth server for Pre-Auth Code flow (no eSignet needed).
mosip.certify.authorization.url=${mosip.certify.domain.url}

mosip.certify.supported.jwt-proof-alg={'RS256','PS256', 'ES256', 'Ed25519'}
mosip.certify.plugin-mode=DataProvider

mosip.certify.cnonce-expire-seconds=40

mosip.certify.identifier=${mosip.certify.domain.url}
mosip.certify.authn.filter-urls={ '${server.servlet.path}/issuance/credential', '${server.servlet.path}/issuance/vd11/credential', '${server.servlet.path}/issuance/vd12/credential' }
mosip.certify.authn.issuer-uri=${mosip.certify.authorization.url}
mosip.certify.authn.jwk-set-uri=${mosip.certify.authorization.url}${server.servlet.path}/.well-known/jwks.json
mosip.certify.authn.allowed-audiences={ '${mosip.certify.domain.url}${server.servlet.path}/issuance/credential' }

## Actuator
management.endpoint.env.show-values=ALWAYS
management.endpoints.web.exposure.include=*

## Key-manager
mosip.kernel.crypto.asymmetric-algorithm-name=RSA/ECB/OAEPWITHSHA-256ANDMGF1PADDING
mosip.kernel.crypto.symmetric-algorithm-name=AES/GCM/NoPadding
mosip.kernel.keygenerator.asymmetric-algorithm-name=RSA
mosip.kernel.keygenerator.symmetric-algorithm-name=AES
mosip.kernel.keygenerator.asymmetric-key-length=2048
mosip.kernel.keygenerator.symmetric-key-length=256
mosip.kernel.data-key-splitter=#KEY_SPLITTER#
mosip.kernel.crypto.gcm-tag-length=128
mosip.kernel.crypto.hash-algorithm-name=PBKDF2WithHmacSHA512
mosip.kernel.crypto.hash-symmetric-key-length=256
mosip.kernel.crypto.hash-iteration=100000
mosip.kernel.crypto.sign-algorithm-name=RS256
mosip.kernel.certificate.sign.algorithm=SHA256withRSA

mosip.kernel.keymanager.hsm.config-path=CERTIFY_PKCS12/local.p12
mosip.kernel.keymanager.hsm.keystore-type=PKCS12
mosip.kernel.keymanager.hsm.keystore-pass=local

mosip.kernel.keymanager.certificate.default.common-name=www.example.com
mosip.kernel.keymanager.certificate.default.organizational-unit=EXAMPLE-CENTER
mosip.kernel.keymanager.certificate.default.organization=IIITB
mosip.kernel.keymanager.certificate.default.location=BANGALORE
mosip.kernel.keymanager.certificate.default.state=KA
mosip.kernel.keymanager.certificate.default.country=IN

mosip.kernel.keymanager.softhsm.certificate.common-name=www.example.com
mosip.kernel.keymanager.softhsm.certificate.organizational-unit=Example Unit
mosip.kernel.keymanager.softhsm.certificate.organization=IIITB
mosip.kernel.keymanager.softhsm.certificate.country=IN

mosip.kernel.partner.sign.masterkey.application.id=PMS
mosip.kernel.partner.allowed.domains=DEVICE

mosip.kernel.keymanager.jwtsign.validate.json=false
mosip.keymanager.dao.enabled=false
crypto.PrependThumbprint.enable=true

mosip.kernel.keymgr.hsm.health.check.enabled=true
mosip.kernel.keymgr.hsm.health.key.app-id=CERTIFY_SERVICE
mosip.kernel.keymgr.hsm.healthkey.ref-id=TRANSACTION_CACHE
mosip.kernel.keymgr.hsm.health.check.encrypt=true

mosip.certify.cache.security.secretkey.reference-id=TRANSACTION_CACHE

## Database
mosip.certify.database.hostname=certify-postgres
mosip.certify.database.port=5432
spring.datasource.url=jdbc:postgresql://${mosip.certify.database.hostname}:${mosip.certify.database.port}/inji_certify?currentSchema=certify
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

## Cache (simple — no Redis needed)
spring.cache.type=simple
spring.data.redis.host=cache
spring.data.redis.port=6379
spring.data.redis.password=redis
spring.cache.cache-names=${mosip.certify.cache.names}
management.health.redis.enabled=false

mosip.certify.access-token-expire-seconds=86400
mosip.certify.certificatedatacache-expire-seconds=3600
mosip.certify.common.cache-expire-seconds=3600
mosip.certify.jwks-cache-expire-seconds=300

mosip.certify.cache.names=userinfo,vcissuance,certificatedatacache,credentialConfig,renderTemplate,jwks,preAuthCodeCache,asMetadataCache,credentialOfferCache,issuerMetadataCache
mosip.certify.cache.size={'userinfo': 200, 'vcissuance' : 2000, 'jwks': 1, 'preAuthCodeCache': 1000, 'credentialOfferCache': 1000, 'issuerMetadataCache': 10 }
mosip.certify.cache.expire-in-seconds={'userinfo': ${mosip.certify.access-token-expire-seconds}, 'vcissuance': ${mosip.certify.access-token-expire-seconds}, 'certificatedatacache': ${mosip.certify.certificatedatacache-expire-seconds}, 'credentialConfig': ${mosip.certify.common.cache-expire-seconds}, 'renderTemplate': ${mosip.certify.common.cache-expire-seconds}, 'jwks': ${mosip.certify.jwks-cache-expire-seconds}}

mosip.certify.credential-config.cryptographic-binding-methods-supported={\
  'ldp_vc': {'did:jwk','did:key'},\
  'mso_mdoc': {'cose_key'},\
  'vc+sd-jwt': {'did:jwk','did:key'}\
}
mosip.certify.credential-config.credential-signing-alg-values-supported={\
  'RsaSignature2018': {'RS256'},\
  'Ed25519Signature2018': {'EdDSA'},\
  'Ed25519Signature2020': {'EdDSA'},\
  'EcdsaKoblitzSignature2016': {'ES256K'},\
  'EcdsaSecp256k1Signature2019': {'ES256K'},\
  'EcdsaSecp256r1Signature2019': {'ES256'},\
  'ecdsa-rdfc-2019': {'ES256K'},\
  'ecdsa-jcs-2019': {'ES256K'},\
  'eddsa-rdfc-2022': {'EdDSA'},\
  'eddsa-jcs-2022': {'EdDSA'}\
}
mosip.certify.credential-config.proof-types-supported={\
  'jwt': {'proof_signing_alg_values_supported': {'RS256', 'PS256', 'ES256', 'Ed25519'}}\
}
mosip.certify.data-provider-plugin.credential-status.allowed-status-purposes={'revocation'}
mosip.certify.issuer.ledger-enabled=true
mosip.certify.signature-algo.key-alias-mapper={\
    'RS256': {{'CERTIFY_VC_SIGN_RSA', ''}},\
    'EdDSA': {{'CERTIFY_VC_SIGN_ED25519', 'ED25519_SIGN'}},\
    'ES256K': {{'CERTIFY_VC_SIGN_EC_K1', 'EC_SECP256K1_SIGN'}},\
    'ES256': {{'CERTIFY_VC_SIGN_EC_R1', 'EC_SECP256R1_SIGN'}}\
}

## OAuth AS Metadata (Certify as its own auth server for Pre-Auth Code)
mosip.certify.oauth.issuer=${mosip.certify.authorization.url}
mosip.certify.oauth.token-endpoint=${mosip.certify.authorization.url}${server.servlet.path}/oauth/token
mosip.certify.oauth.jwks-uri=${mosip.certify.authorization.url}${server.servlet.path}/.well-known/jwks.json
mosip.certify.oauth.grant-types-supported=authorization_code,urn:ietf:params:oauth:grant-type:pre-authorized_code
mosip.certify.oauth.response-types-supported=code
mosip.certify.oauth.code-challenge-methods-supported=S256
mosip.certify.oauth.interactive-authorization-endpoint=${mosip.certify.authorization.url}${server.servlet.path}/oauth/iar
mosip.certify.oauth.access-token.audience=${mosip.certify.identifier}/v1/certify/issuance/credential

## Pre-Authorized Code
mosip.certify.pre-auth-code.default-expiry-seconds=600
mosip.certify.pre-auth-code.min-expiry-seconds=60
mosip.certify.pre-auth-code.max-expiry-seconds=3600

## Authorization Server mapping
mosip.certify.authorization.default-server=${mosip.certify.oauth.issuer}
mosip.certify.credential-config.as-mapping={}
mosip.certify.credential-offer-url=${mosip.certify.domain.url}${server.servlet.path}/credential-offer-data/

## Verify Service (not used in this test setup)
mosip.certify.verify.service.base-url=http://verify-service:8080
mosip.certify.verify.service.vp-request-endpoint=${mosip.certify.verify.service.base-url}/v1/verify/vp-request
mosip.certify.verify.service.vp-result-endpoint=${mosip.certify.verify.service.base-url}/v1/verify/vp-result
mosip.certify.verify.service.verifier-client-id=certify-verifier-client
mosip.certify.vp-request.config-file-url=http://certify-nginx/vp_request_config.json
