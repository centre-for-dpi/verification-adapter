server {
    listen 8000;
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Verification requests → adapter
    location /v1/verify/vc-verification {
        proxy_pass http://adapter:8085/v1/verify/vc-verification;
        proxy_set_header Host $host;
        proxy_set_header Connection close;
    }

    # Other verify-service endpoints → Inji Verify directly
    location /v1/verify {
        proxy_pass http://inji-verify-service:8080/v1/verify;
        proxy_set_header Host $host;
        proxy_set_header Connection close;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
